# 컨텍스트 템플릿
templates:
  - id: "default_context"
    name: "표준 템플릿"
    description: "표준 컨텍스트 서식 템플릿"
    has_knowledge_base: true
    content: |
      아래 참고 자료를 바탕으로 사용자 질문에 답하세요.

      참고 자료:
      {{contexts}}

      사용자 질문: {{query}}

      위 참고 자료를 바탕으로 답하세요. 참고 자료가 부족하면 명확히 알려 주세요.

  - id: "detailed_context"
    name: "상세 템플릿"
    description: "상세 설명이 포함된 컨텍스트 템플릿"
    has_knowledge_base: true
    content: |
      ## 작업 설명
      제공된 참고 자료를 바탕으로 정확하고 포괄적으로 답변하세요.

      ## 참고 자료
      {{contexts}}

      ## 사용자 질문
      {{query}}

      ## 답변 요구 사항
      1. 참고 자료만으로 답하고 정보를 지어내지 마세요
      2. 여러 자료가 충돌하면 종합적으로 분석하세요
      3. 출처를 적절히 인용해 신뢰도를 높이세요
      4. 자료가 부족하면 명확히 알려 주세요

      현재 시간: {{current_time}} {{current_week}}

  - id: "simple_context"
    name: "간결 템플릿"
    description: "간결한 컨텍스트 템플릿"
    has_knowledge_base: true
    content: |
      참고 자료:
      {{contexts}}

      질문: {{query}}

      위 질문에 답하세요.

  - id: "qa_context"
    name: "Q&A 템플릿"
    description: "Q&A 시나리오 전용 템플릿"
    has_knowledge_base: true
    content: |
      질문에 답해야 합니다. 다음은 관련될 수 있는 자료입니다:

      {{contexts}}

      사용자 질문: {{query}}

      위 자료를 바탕으로 답하세요. 답변 요구 사항:
      - 질문에 바로 답하고 질문을 반복하지 마세요
      - 자료에 관련 정보가 없으면 알려 주세요
      - 답변은 간결하고 정확하게 유지하세요
