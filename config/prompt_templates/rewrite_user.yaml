# 사용자 프롬프트 재작성 템플릿
templates:
  - id: "default_rewrite_user"
    name: "표준 형식"
    description: "표준 사용자 프롬프트 재작성 형식"
    content: |
      ## 이전 대화 배경
      {{conversation}}

      ## 재작성해야 할 사용자 질문
      {{query}}

      ## 재작성된 질문

  - id: "detailed_rewrite_user"
    name: "상세 형식"
    description: "상세 사용자 프롬프트 재작성 형식"
    content: |
      ## 이전 대화 배경
      아래는 사용자와 어시스턴트의 대화 기록입니다. 맥락 이해를 위해 읽어 주세요:

      {{conversation}}

      ## 현재 사용자 질문
      {{query}}

      ## 작업 요구사항
      위 대화 기록을 바탕으로 현재 질문을 독립적이고 완전하며 맥락 없이도 이해 가능한 질문으로 재작성하세요.

      ## 재작성된 질문
