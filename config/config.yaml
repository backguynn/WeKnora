# 서버 설정
server:
  port: 8080
  host: "0.0.0.0"

# 대화 서비스 설정
conversation:
  max_rounds: 5
  keyword_threshold: 0.3
  embedding_top_k: 10
  vector_threshold: 0.5
  rerank_threshold: 0.5
  rerank_top_k: 5
  fallback_strategy: "model"
  fallback_response: "죄송합니다. 이 질문에는 답변할 수 없습니다."
  fallback_prompt: |
    당신은 전문적이고 친절한 AI 어시스턴트입니다. 보유한 지식을 바탕으로 사용자 질문에 직접 답하세요.

    ## 답변 요구 사항
    - 사용자 질문에 바로 답변
    - 간결하고 명확하게, 핵심 있게
    - 실시간 데이터나 개인정보 관련이면 접근 불가를 정직하게 알림
    - 예의 바르고 전문적인 어조 사용

    ## 사용자 질문:
    {{query}}
  enable_rewrite: true
  enable_query_expansion: true
  enable_rerank: true
  rewrite_prompt_system: |
    당신은 지시 대상 해소와 생략 보완에 집중하는 지능형 어시스턴트입니다. 대화 맥락을 바탕으로 사용자 질문의 대명사를 명확한 주어로 치환하고, 생략된 핵심 정보를 보완하세요.

    ## 재작성 목표
    대화 이력에 따라 현재 사용자 질문을 재작성하세요. 목표는 다음과 같습니다:
    - 지시 대상 해소: "그것", "이것", "저것", "그", "그녀", "그것들", "그들", "그녀들" 같은 대명사를 명확한 주어로 대체
    - 생략된 핵심 정보를 보완하여 질문 의미를 완전하게 만듦
    - 질문의 원래 의미와 표현 방식을 유지
    - 재작성 결과도 반드시 질문이어야 함
    - 재작성된 질문은 30자 이내
    - 재작성된 질문만 출력하고, 어떤 설명도 하지 말 것. 답변 시도도 하지 말 것(다른 어시스턴트가 답변함)

    ## Few-shot 예시

    예시1:
    대화 이력:
    사용자: 위챗페이에는 어떤 기능이 있나요?
    어시스턴트: 위챗페이의 주요 기능에는 송금, 결제 코드, 수금, 신용카드 상환 등 다양한 결제 서비스가 포함됩니다.

    사용자 질문: 보안성은?
    재작성: 위챗페이의 보안성

    예시2:
    대화 이력:
    사용자: 아이폰 배터리가 빨리 닳으면 어떻게 해야 하나요?
    어시스턴트: 화면 밝기를 낮추고 백그라운드 앱을 끄며 정기적으로 시스템을 업데이트하면 배터리 수명을 늘릴 수 있습니다.

    사용자 질문: 이렇게 하면 사용 경험에 영향이 있나요?
    재작성: 화면 밝기를 낮추고 백그라운드 앱을 끄는 것이 사용 경험에 영향을 주나요?

    예시3:
    대화 이력:
    사용자: 홍샤오러우는 어떻게 만들어요?
    어시스턴트: 홍샤오러우는 먼저 고기를 데친 뒤 간장과 설탕 등의 양념을 넣어 약불로 오래 조립니다.

    사용자 질문: 얼마나 조려야 하나요?
    재작성: 홍샤오러우는 얼마나 조려야 하나요?

    예시4:
    대화 이력:
    사용자: 베이징에서 상하이까지 고속철 요금은 얼마인가요?
    어시스턴트: 베이징-상하이 고속철 요금은 열차와 좌석 유형에 따라 달라지며, 2등석은 약 553위안, 1등석은 약 933위안입니다.

    사용자 질문: 시간은요?
    재작성: 베이징에서 상하이까지 고속철 소요 시간은 얼마인가요?

    예시5:
    대화 이력:
    사용자: 위챗 계정은 어떻게 등록하나요?
    어시스턴트: 위챗 계정 등록은 위챗 앱을 다운로드한 뒤 휴대폰 번호를 입력하고 인증 코드를 받은 다음 닉네임과 비밀번호를 설정합니다.

    사용자 질문: 해외 번호도 되나요?
    재작성: 해외 휴대폰 번호로 위챗 계정을 등록할 수 있나요?
  rewrite_prompt_user: |
    ## 대화 이력 배경
    {{conversation}}

    ## 재작성할 사용자 질문
    {{query}}

    ## 재작성된 질문
  keywords_extraction_prompt: |
    # 역할
    당신은 전문 키워드 추출 어시스턴트입니다. 사용자 질문에서 가장 중요한 키워드/구를 추출하세요.

    # 요구 사항
    - 사용자 질문을 요약하고 가장 중요한 키워드/구를 최대 5개까지 제시
    - 쉼표로 키워드/구를 구분
    - 키워드/구는 사용자 질문에서만 가져오며, 추측하거나 만들어내지 말 것
    - 어떤 설명도 출력하지 말고 키워드/구만 출력(접두어, 설명, 문장부호 금지). 답변 시도도 하지 말 것(다른 어시스턴트가 검색함)

    # 출력 형식
    keyword1, keyword2, keyword3, keyword4, keyword5

    # Examples

    ## Example 1
    USER: 영어 회화 실력을 어떻게 높일 수 있나요?
    ###############
    Output: 영어 회화, 회화 실력, 영어 회화 향상, 영어 회화 실전, 영어 회화 연습

    ## Example 2
    USER: 요즘 상하이에서 볼만한 전시나 행사가 있나요?
    ###############
    Output: 상하이 전시, 전시 행사, 상하이 전시 추천, 전시 행사 추천, 상하이 행사

    ## Example 3
    USER: 아이폰 배터리가 빨리 닳을 때 해결 방법은?
    ###############
    Output: 아이폰, 배터리 소모, 배터리 최적화, 배터리 수명, 배터리 관리

    ## Example 4
    USER: Python 로고는 어떻게 생겼나요?
    ###############
    Output: Python Logo

    ## Example 5
    USER: iPhone에서 WiFi를 어떻게 연결하나요?
    ###############
    Output: iPhone, WiFi 연결, iPhone WiFi 연결

    # Real Data
    USER: {{query}}

  keywords_extraction_prompt_user: |
    Output:

  generate_summary_prompt: |
    당신은 정확한 문서 요약 전문가입니다. 사용자가 제공한 문서 또는 발췌문의 핵심 내용을 추출해 요약하세요.

    ## 핵심 요구 사항
    - 요약 길이는 50~100자 내외로, 내용 복잡도에 따라 유연하게 조정
    - 제공된 문서 내용만을 기반으로 요약하며, 문서에 없는 정보는 추가하지 말 것
    - 요약에 핵심 정보와 주요 결론이 포함되도록 할 것
    - 내용이 복잡하거나 전문적이어도 핵심 요점을 최대한 추출해 요약할 것
    - 요약 결과만 직접 출력하고 어떤 서두나 설명도 포함하지 말 것

    ## 형식 및 스타일
    - 객관적이고 중립적인 3인칭 서술체 사용
    - 명확하고 간결한 한국어 표현 사용
    - 문장 간 논리적 연결성을 유지
    - 같은 표현이나 문장 구조의 반복을 피할 것

    ## 주의 사항
    - "생성할 수 없음", "요약 불가", "내용 부족" 같은 거절 문구는 절대 출력하지 말 것
    - 예시 내용을 베끼거나 참고하지 말고, 반드시 새로운 문서에 기반해 요약할 것
    - 텍스트 길이나 난이도와 무관하게 최대한 핵심을 추출해 요약할 것
    
    ## 아래는 사용자가 제공한 문서 관련 정보입니다:

  generate_session_title_prompt: |
    사용자 질문을 바탕으로 짧은 세션 제목을 생성하세요.

    요구 사항:
    - 5~10자
    - 핵심 주제 추출
    - 제목만 출력하고 설명은 하지 말 것

    사용자 질문:
  summary:
    repeat_penalty: 1.0
    temperature: 0.3
    max_completion_tokens: 2048
    no_match_prefix: |-
      <think>
      </think>
      NO_MATCH
    prompt: |
      당신은 WeKnora라는 전문 지능형 정보 검색 어시스턴트입니다. 고급 비서처럼 검색된 정보에 기반해 사용자 질문에 답하며, 어떤 선행 지식도 사용하지 마세요.
      사용자가 질문하면, 어시스턴트는 특정 정보에 기반해 답변합니다. 먼저 내부적으로 추론 과정을 거친 뒤 사용자에게 답합니다.
      ## 답변 규칙
      - 검색된 정보의 사실만을 바탕으로 답변하고, 선행 지식을 사용하지 마세요. 객관성과 정확성을 유지합니다.
      - 복잡한 질문/답변은 Markdown 구조로 분리해 제시하되, 총괄 설명은 분리하지 않습니다.
      - 간단한 답변은 과도하게 세분화하지 않습니다.
      - 결과에 사용하는 이미지 주소는 반드시 검색된 정보에서 가져와야 하며, 허위로 만들지 않습니다.
      - 결과의 텍스트와 이미지가 검색된 정보에서 왔는지 확인하고, 검색 정보에 없는 내용으로 확장했다면 수정해 최종 답을 만듭니다.
      - 사용자 질문에 답할 수 없으면 사실대로 알리고 합리적인 제안을 제공합니다.

      ## 출력 제한
      - Markdown 형식(텍스트+이미지)으로 최종 결과를 출력
      - 출력 내용은 짧고도 충분히 포괄적이어야 하며, 구조가 명확하고 중복이 없어야 합니다.

    context_template: "{{query}}"
  extract_entities_prompt: |
    ## 작업
    사용자 제공 텍스트에서 아래 엔티티 유형에 해당하는 모든 엔티티를 추출하세요:
    EntityTypes: [Person, Organization, Location, Product, Event, Date, Work, Concept, Resource, Category, Operation]

    ## 요구 사항
    1. 결과는 반드시 JSON 배열 형식으로 출력
    2. 각 엔티티는 title과 type 필드를 반드시 포함, description은 선택이지만 강력히 권장
    3. type 값은 EntityTypes 목록에서만 선택하고 새 유형 생성 금지
    4. 엔티티 유형을 확정할 수 없으면 무리하게 분류하지 말고 추출하지 말 것
    5. 어떤 설명이나 부가 내용 없이 JSON 배열만 출력
    6. 모든 필드 값에 HTML 태그나 코드 포함 금지
    7. 엔티티에 모호성이 있으면 description에 구체적 지시 대상을 명시
    8. 엔티티가 없으면 빈 배열 [] 반환

    ## 엔티티 추출 규칙
    - Person: 실제 또는 가상의 인물(역사 인물, 현대 인물, 문학 인물 등)
    - Organization: 회사, 정부 기관, 팀, 학교 등 조직
    - Location: 지리적 위치, 랜드마크, 국가, 도시 등
    - Product: 상품, 서비스, 브랜드 등 상업적 제품
    - Event: 사건, 회의, 축제, 역사적 사건 등
    - Date: 날짜, 기간, 시대 등 시간 관련 정보
    - Work: 책, 영화, 음악, 예술 작품 등 창작물
    - Concept: 추상 개념, 사상, 이론 등
    - Resource: 자연 자원, 정보 자원, 도구 등
    - Category: 분류, 범주, 분야 등
    - Operation: 조작, 동작, 방법, 과정 등

    ## 추출 단계
    1. 텍스트를 꼼꼼히 읽고 가능한 엔티티를 식별
    2. 각 엔티티의 가장 적합한 유형을 결정(EntityTypes에서 선택)
    3. 각 엔티티에 대해 다음 필드를 포함한 JSON 객체 생성:
       - title: 엔티티의 표준 명칭(수식어, 따옴표 등 제외)
       - type: EntityTypes에서 선택한 엔티티 유형
       - description: 텍스트 내용에 기반한 간결한 한국어 설명
    4. 각 엔티티 필드가 올바르고 형식화되어 있는지 검증
    5. 모든 엔티티 객체를 하나의 JSON 배열로 합침
    6. 최종 JSON이 유효하고 요구 사항에 맞는지 확인

    ## 예시
    [입력]
    텍스트: 《홍루몽》은 《석두기》라는 이름으로도 알려져 있으며, 청나라 작가 조설근이 창작한 중국 고전 4대 명작 중 하나로 중국 봉건 사회의 백과사전으로 불립니다. 이 책의 전 80회는 조설근이 썼고, 후 40회는 일반적으로 고악이 이어 쓴 것으로 여겨집니다. 소설은 가씨, 사씨, 왕씨, 설씨 네 가문의 흥망을 배경으로 가보옥, 임대옥, 설보채의 사랑 비극을 중심 줄거리로 삼아 가보옥과 금릉십이채를 중심으로 한 정사 양부, 현우 병출의 복잡한 인물 군상을 묘사합니다. 건륭 연간(1743년 전후)에 완성되었으며, 중국 문학사에서 현실주의의 정점으로 평가되어 후대에 큰 영향을 미쳤습니다.

