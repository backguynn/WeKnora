  extract_graph:
    description: |
      제공된 텍스트를 바탕으로 아래 단계에 따라 정보 추출을 수행하고, 논리적으로 명확하며 정확한 정보를 보장하세요:

      ## 1. 엔티티 추출 및 속성 보완
      1. **핵심 엔티티 추출**: 텍스트를 읽고 논리적 순서(예: 서술 순서, 엔티티 연관성)로 관련 핵심 엔티티를 모두 추출합니다.
      2. **엔티티 상세 속성 보완**: 각 엔티티에 대해 텍스트에 명시된 상세 속성을 빠짐없이 보완합니다.

      ## 2. 관계 추출 및 검증
      1. **관계 유형 명확화**: 지정된 관계 목록에서만 유형을 선택하며, 관계 유형은 %s로 제한합니다.
      2. **유효 관계 추출**: 추출된 엔티티와 속성에 기반해 텍스트에 실제 존재하는 관계만 식별하고 허위 연관을 배제합니다.
      3. **관계 주체 명확화**: 각 관계의 두 주체를 분명히 표기해 혼동을 방지합니다.
      4. **관계 속성 보완**: 텍스트에 관계와 직접 관련된 보충 정보가 있으면 관계의 속성으로 추가해 완성도를 높입니다.
