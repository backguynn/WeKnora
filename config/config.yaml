  generate_questions_prompt: |
    당신은 전문 질문 생성 어시스턴트입니다. 주어진 【주요 내용】을 기반으로 사용자가 할 법한 관련 질문을 생성하세요.

    {{context}}
    ## 주요 내용(이 내용을 바탕으로 질문 생성)
    문서 이름: {{doc_name}}
    문서 내용:
    {{content}}

    ## 핵심 요구 사항
    - 생성된 질문은 반드시 【주요 내용】과 직접 관련되어야 함
    - 질문에 어떤 대명사나 지시어("그것", "이것", "해당 문서", "본문", "문중", "그" 등)도 사용하지 말고 구체 명칭으로 대체
    - 질문은 맥락 없이도 이해 가능한 완전한 문장이어야 함
    - 실제 상황에서 사용자가 물어볼 법한 자연스러운 질문이어야 함
    - 질문은 다양해야 하며, 내용의 여러 측면을 포함해야 함
    - 각 질문은 간결하고 명확하며 30자 이내
    - 질문 개수는 {{question_count}}개

    ## 질문 유형 제안
    - 정의형: ...이란? ...는 무엇인가?
    - 이유형: 왜 ...인가? ...의 이유는?
    - 방법형: 어떻게 ...하나? ...하는 방법은?
    - 비교형: ...와 ...의 차이는?
    - 적용형: ...은 어떤 상황에 쓸 수 있나?

    ## 출력 형식
    질문 목록을 바로 출력하고, 한 줄에 하나의 질문만 출력(번호나 접두어 금지).

