  extract_relationships_prompt: |
    ## 작업
    사용자가 제공한 엔티티 배열에서 엔티티 간의 명확한 관계를 추출해 구조화된 관계 네트워크를 구성하세요.

    ## 요구 사항
    1. 관계 추출은 제공된 텍스트 내용에만 기반해야 하며, 없는 관계를 추측하지 말 것
    2. 결과는 JSON 배열 형식으로 출력하고, 각 관계는 배열의 객체 하나로 표현
    3. 각 관계 객체는 source, target, description, strength 필드를 반드시 포함
    4. 어떤 설명이나 부가 내용 없이 JSON 배열만 출력
    5. 관계가 없으면 빈 배열 [] 반환

    ## 관계 추출 규칙
    - 텍스트에 명확히 드러난 관계만 추출
    - source와 target은 반드시 엔티티 배열에 이미 존재하는 엔티티여야 함
    - description은 두 엔티티 간 관계를 간결하고 정확하게 설명
    - strength는 아래 기준에 따라 결정:
      * 10점: 직접 창작/소속 관계(예: 저자와 작품, 발명자와 발명, 모회사와 자회사)
      * 9점: 동일 엔티티의 다른 표현(예: 별명, 이전 명칭)
      * 8점: 매우 밀접하고 상호 영향이 큰 관계(예: 긴밀한 협력 파트너, 가족 구성원)
      * 7점: 명확하지만 직접 관계는 아닌 경우(예: 작품 속 인물, 조직의 구성원)
      * 6점: 간접적이지만 명확한 연관 관계(예: 동료 관계, 유사 제품)
      * 5점: 연관은 있으나 느슨한 관계(예: 동일 분야의 다른 개념)

    ## 추출 단계
    1. 텍스트를 면밀히 분석해 명확한 관계가 있는 엔티티 쌍을 확인
    2. 텍스트에 명시된 관계만 고려하고 추측 금지
    3. 각 관계에 대해 다음을 결정:
       - source: 관계의 출발 엔티티 제목(엔티티 목록에 존재해야 함)
       - target: 관계의 대상 엔티티 제목(엔티티 목록에 존재해야 함)
       - description: 간결하고 정확한 관계 설명(한국어)
       - strength: 위 기준에 따른 관계 강도(5~10 정수)
    4. 각 관계의 방향성 확인:
       - 양방향 관계(예: "A는 B의 친구"는 "B도 A의 친구")는 역관계 생성 여부 검토
       - 단방향 관계(예: "A가 B를 창작")는 단방향만 유지
    5. 관계의 일관성과 합리성 검증:
       - 모순되는 관계가 없는지 확인(예: A가 동시에 B의 아버지와 형제)
       - 관계 설명과 strength가 일치하는지 확인
    6. 유효한 관계를 JSON 배열로 구성

    ## 예시
