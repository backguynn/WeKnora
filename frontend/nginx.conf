server {
    listen 80;
    server_name localhost;
    # Default 50M, configured via MAX_FILE_SIZE_MB env var
    client_max_body_size ${MAX_FILE_SIZE};
    
    # 보안 헤더 설정
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # 에러 로그 설정
    error_log /var/log/nginx/error.log warn;
    access_log /var/log/nginx/access.log;

    # 프런트엔드 정적 파일
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # 로컬 스토리지 파일을 백엔드 서비스로 프록시 (마크다운 내 이미지 렌더링용)
    # /files 경로를 정확히 매칭해 Nginx의 자동 / 추가로 인한 301 리다이렉트 방지
    location = /files {
        proxy_pass ${APP_SCHEME}://${APP_HOST}:${APP_PORT}/files;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API 요청을 백엔드 서비스로 프록시
    # APP_SCHEME 기본값은 http, 원격 HTTPS 백엔드는 https로 설정 가능
    location /api/ {
        proxy_pass ${APP_SCHEME}://${APP_HOST}:${APP_PORT}/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 연결 및 재시도 설정
        proxy_connect_timeout 30s;                 # 연결 타임아웃
        proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
        proxy_next_upstream_tries 3;               # 재시도 횟수
        proxy_next_upstream_timeout 30s;           # 재시도 타임아웃
        
        # SSE 관련 설정
        proxy_http_version 1.1;                    # HTTP/1.1 사용
        proxy_set_header Connection "";            # Connection: close 비활성화, 연결 유지
        chunked_transfer_encoding off;             # 청크 전송 인코딩 비활성화
        proxy_buffering off;                       # 버퍼링 비활성화
        proxy_cache off;                           # 캐시 비활성화
        proxy_read_timeout 3600s;                  # 읽기 타임아웃 증가
        proxy_send_timeout 3600s;                  # 전송 타임아웃 증가
    }

    # 에러 페이지
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}